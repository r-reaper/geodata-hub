version: "3.9"

services:
  # ── PostgreSQL + PostGIS ─────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: geodata_hub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: geodata_hub
      POSTGRES_USER: geodata_admin
      POSTGRES_PASSWORD: CHANGE_ME_IN_PRODUCTION
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geodata_admin -d geodata_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geodata_hub_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://geodata_admin:CHANGE_ME_IN_PRODUCTION@db:5432/geodata_hub
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Optional: MinIO for file storage ─────────────
  minio:
    image: minio/minio:latest
    container_name: geodata_hub_storage
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: geodata_minio
      MINIO_ROOT_PASSWORD: CHANGE_ME_IN_PRODUCTION
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data: